server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy PVGIS — does not send CORS headers so browser requests are blocked
    location /api/pvgis/ {
        proxy_pass https://re.jrc.ec.europa.eu/api/v5_3/;
        proxy_ssl_server_name on;
        proxy_set_header Host re.jrc.ec.europa.eu;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy Eloverblik — Authorization header forwarded for token exchange and data calls
    location /api/eloverblik/ {
        proxy_pass https://api.eloverblik.dk/customerapi/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.eloverblik.dk;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://api.energidataservice.dk https://nominatim.openstreetmap.org; img-src 'self' https://*.tile.openstreetmap.org https://unpkg.com data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';";
}
