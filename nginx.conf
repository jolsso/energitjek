server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://re.jrc.ec.europa.eu https://api.energidataservice.dk https://nominatim.openstreetmap.org; img-src 'self' https://*.tile.openstreetmap.org https://unpkg.com data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';";
}
